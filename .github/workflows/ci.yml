name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  package:
    name: Package and site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Check example tiers are in sync
        run: pnpm run tiers:check

      - name: Build product site
        run: pnpm run site:build

  docs:
    name: Mintlify docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate docs
        working-directory: docs-site
        run: npx --yes mint@latest validate

      - name: Check docs links
        working-directory: docs-site
        run: npx --yes mint@latest broken-links --check-anchors --check-redirects
