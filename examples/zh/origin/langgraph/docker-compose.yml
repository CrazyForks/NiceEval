# 本地自托管的 trace 查看器——LangSmith 本身是 SaaS,没有自托管选项,这里用
# Jaeger 接同一份标准 OTLP/HTTP 数据,方便本地开发时肉眼看 span。
# 真要看 LangSmith 官方 UI(prompt/completion 内容、按 run 分组等),把
# .env 里的 OTEL_EXPORTER_OTLP_ENDPOINT 换成 LangSmith 云端端点即可,应用代码不用改。
services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    restart: unless-stopped
    ports:
      - "4318:4318"   # OTLP HTTP 接收端口——OTEL_EXPORTER_OTLP_ENDPOINT 指这里
      - "16686:16686" # Jaeger UI:http://localhost:16686
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
