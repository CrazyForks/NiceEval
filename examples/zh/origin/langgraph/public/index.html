<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LangGraph + LangSmith OTel 示例</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: system-ui, -apple-system, "PingFang SC", sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
  h1 { font-size: 1.25rem; margin-bottom: 0.25rem; }
  #meta { font-size: 0.85rem; opacity: 0.7; margin-bottom: 1rem; }
  #log { border: 1px solid #8884; border-radius: 8px; padding: 1rem; min-height: 320px; max-height: 60vh; overflow-y: auto; margin-bottom: 1rem; }
  .msg { margin-bottom: 0.75rem; white-space: pre-wrap; line-height: 1.5; }
  .msg .role { font-weight: 600; margin-right: 0.4rem; }
  .tool-call { margin: 0.35rem 0 0.35rem 1.2rem; padding: 0.5rem 0.75rem; border-left: 3px solid #8886; font-size: 0.8rem; background: #8881; border-radius: 4px; font-family: ui-monospace, monospace; word-break: break-all; }
  form { display: flex; gap: 0.5rem; }
  input[type="text"] { flex: 1; padding: 0.5rem 0.75rem; border-radius: 6px; border: 1px solid #8886; font-size: 1rem; }
  button { padding: 0.5rem 1rem; border-radius: 6px; border: none; background: #2563eb; color: white; cursor: pointer; font-size: 1rem; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
</style>
</head>
<body>
  <h1>LangGraph / LangChain + LangSmith OTel 示例</h1>
  <p id="meta">
    试着问"北京天气怎么样"或"12*(3+4)等于多少"触发工具调用。
  </p>
  <div id="log"></div>
  <form id="form">
    <input id="input" type="text" placeholder="输入消息…" autocomplete="off" />
    <button type="submit">发送</button>
  </form>

<script>
  const log = document.getElementById("log");
  const form = document.getElementById("form");
  const input = document.getElementById("input");
  const sessionId = "session-" + Math.random().toString(36).slice(2, 10);

  function appendMessage(role, text) {
    const el = document.createElement("div");
    el.className = "msg";
    const roleEl = document.createElement("span");
    roleEl.className = "role";
    roleEl.textContent = role;
    el.appendChild(roleEl);
    el.appendChild(document.createTextNode(text));
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
  }

  function appendToolCalls(toolCalls) {
    for (const call of toolCalls) {
      const el = document.createElement("div");
      el.className = "tool-call";
      el.textContent = "🔧 " + call.name + "(" + JSON.stringify(call.input) + ") -> " + JSON.stringify(call.output);
      log.appendChild(el);
    }
    log.scrollTop = log.scrollHeight;
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    const message = input.value.trim();
    if (!message) return;
    input.value = "";
    appendMessage("你: ", message);

    const button = form.querySelector("button");
    button.disabled = true;
    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ message, sessionId }),
      });
      const data = await res.json();
      if (!res.ok) {
        appendMessage("错误: ", data.error ?? ("HTTP " + res.status));
        return;
      }
      if (Array.isArray(data.toolCalls) && data.toolCalls.length > 0) appendToolCalls(data.toolCalls);
      appendMessage("助手: ", data.reply);
    } catch (err) {
      appendMessage("错误: ", err instanceof Error ? err.message : String(err));
    } finally {
      button.disabled = false;
      input.focus();
    }
  });
</script>
</body>
</html>
