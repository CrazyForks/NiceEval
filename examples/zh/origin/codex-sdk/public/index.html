<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Codex SDK example</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f5;
    color: #1a1a1a;
  }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 16px 96px;
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .subtitle { color: #666; font-size: 13px; margin-bottom: 20px; }
  #log { display: flex; flex-direction: column; gap: 10px; }
  .msg {
    padding: 10px 14px;
    border-radius: 10px;
    max-width: 90%;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user { align-self: flex-end; background: #2563eb; color: white; }
  .msg.assistant { align-self: flex-start; background: white; border: 1px solid #ddd; }
  .msg.error { align-self: flex-start; background: #fee2e2; border: 1px solid #fca5a5; color: #991b1b; }
  .tool-call {
    align-self: flex-start;
    max-width: 90%;
    background: #f0f0f0;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 8px 12px;
    font-family: ui-monospace, monospace;
    font-size: 12px;
  }
  .tool-call summary { cursor: pointer; font-weight: 600; }
  .tool-call pre { margin: 6px 0 0; white-space: pre-wrap; word-break: break-word; }
  form {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    background: white;
    border-top: 1px solid #ddd;
  }
  form > div { max-width: 720px; margin: 0 auto; display: flex; gap: 8px; width: 100%; }
  input[type="text"] {
    flex: 1;
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 14px;
  }
  button {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    font-size: 14px;
    cursor: pointer;
  }
  button:disabled { background: #93b4f0; cursor: not-allowed; }
  #sessionInfo { font-size: 12px; color: #999; margin-top: 8px; }
</style>
</head>
<body>
<main>
  <h1>Codex SDK example</h1>
  <p class="subtitle">
    发自然语言编码请求(比如"创建一个文件"),后端用 Codex SDK 的 thread.run() 真调用 Codex,
    在 workspace/ 目录下真实读写文件、跑命令。
  </p>
  <div id="log"></div>
  <div id="sessionInfo"></div>
</main>
<form id="composer">
  <div>
    <input id="input" type="text" placeholder="例如:创建一个文件叫 notes.txt" autocomplete="off" />
    <button id="send" type="submit">发送</button>
  </div>
</form>
<script>
  const log = document.getElementById("log");
  const form = document.getElementById("composer");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const sessionInfo = document.getElementById("sessionInfo");

  let sessionId = null;

  function addMessage(role, text) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    div.textContent = text;
    log.appendChild(div);
    div.scrollIntoView({ behavior: "smooth", block: "end" });
  }

  function addToolCalls(toolCalls) {
    for (const call of toolCalls) {
      const details = document.createElement("details");
      details.className = "tool-call";
      const summary = document.createElement("summary");
      summary.textContent = "⚙ " + call.name;
      details.appendChild(summary);
      const pre = document.createElement("pre");
      pre.textContent =
        "input:  " + JSON.stringify(call.input, null, 2) + "\n" +
        "output: " + JSON.stringify(call.output, null, 2);
      details.appendChild(pre);
      log.appendChild(details);
    }
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    const message = input.value.trim();
    if (!message) return;

    addMessage("user", message);
    input.value = "";
    sendBtn.disabled = true;

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ message, sessionId }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || ("HTTP " + res.status));

      sessionId = data.sessionId;
      sessionInfo.textContent = "session: " + sessionId;

      if (Array.isArray(data.toolCalls) && data.toolCalls.length > 0) {
        addToolCalls(data.toolCalls);
      }
      addMessage("assistant", data.reply);
    } catch (err) {
      addMessage("error", "错误: " + (err && err.message ? err.message : String(err)));
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  });
</script>
</body>
</html>
