<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>niceeval openinference example</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f1115;
    color: #e6e6e6;
    display: flex;
    justify-content: center;
    padding: 32px 16px;
  }
  main { width: 100%; max-width: 640px; }
  h1 { font-size: 18px; font-weight: 600; margin: 0 0 4px; }
  p.sub { color: #9aa0a6; font-size: 13px; margin: 0 0 20px; }
  #log {
    border: 1px solid #2a2d34;
    border-radius: 10px;
    padding: 16px;
    height: 420px;
    overflow-y: auto;
    background: #14161b;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg { max-width: 85%; padding: 8px 12px; border-radius: 10px; line-height: 1.5; font-size: 14px; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: #2b5cff; color: white; }
  .msg.agent { align-self: flex-start; background: #22252c; }
  .msg.error { align-self: flex-start; background: #4a1f1f; color: #ffb4b4; }
  .tool-call {
    align-self: flex-start;
    max-width: 90%;
    font-size: 12px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    background: #1a2b1f;
    color: #9be2a8;
    border: 1px solid #234a2c;
    border-radius: 8px;
    padding: 6px 10px;
    white-space: pre-wrap;
  }
  form { display: flex; gap: 8px; margin-top: 12px; }
  input {
    flex: 1;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #2a2d34;
    background: #14161b;
    color: #e6e6e6;
    font-size: 14px;
  }
  button {
    padding: 10px 18px;
    border-radius: 8px;
    border: none;
    background: #2b5cff;
    color: white;
    font-size: 14px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: default; }
</style>
</head>
<body>
<main>
  <h1>niceeval openinference example</h1>
  <p class="sub">
    LangChain agent（get_weather / calculate 两个工具）+ OpenInference 埋点，
    span 发给 Phoenix。问「北京天气怎么样」或「12 * 7 等于多少」试试。
  </p>
  <div id="log"></div>
  <form id="form">
    <input id="input" type="text" placeholder="问点什么…" autocomplete="off" />
    <button id="send" type="submit">发送</button>
  </form>
</main>
<script>
  const log = document.getElementById("log");
  const form = document.getElementById("form");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const sessionId = crypto.randomUUID();

  function addMessage(text, cls) {
    const el = document.createElement("div");
    el.className = "msg " + cls;
    el.textContent = text;
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
  }

  function addToolCall(call) {
    const el = document.createElement("div");
    el.className = "tool-call";
    el.textContent = `🔧 ${call.name}(${JSON.stringify(call.input)}) -> ${JSON.stringify(call.output)}`;
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, "user");
    input.value = "";
    sendBtn.disabled = true;

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ message, sessionId }),
      });
      const data = await res.json();
      if (!res.ok) {
        addMessage(data.detail ?? `请求失败 (${res.status})`, "error");
        return;
      }
      for (const call of data.toolCalls ?? []) addToolCall(call);
      addMessage(data.reply, "agent");
    } catch (error) {
      addMessage(`请求出错: ${error}`, "error");
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  });
</script>
</body>
</html>
