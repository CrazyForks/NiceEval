<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Claude Agent SDK 示例</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
    display: flex;
    justify-content: center;
    padding: 24px;
  }
  main {
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  h1 { font-size: 18px; margin: 0; }
  p.subtitle { margin: 0; color: #666; font-size: 13px; }
  #log {
    flex: 1;
    min-height: 360px;
    max-height: 60vh;
    overflow-y: auto;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .msg { padding: 8px 12px; border-radius: 8px; max-width: 85%; white-space: pre-wrap; word-break: break-word; }
  .msg.user { align-self: flex-end; background: #007aff; color: #fff; }
  .msg.assistant { align-self: flex-start; background: #eee; }
  .msg.error { align-self: flex-start; background: #ffe5e5; color: #a30000; }
  .tool-call {
    align-self: flex-start;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
    background: #f0f4ff;
    border: 1px solid #d5deff;
    border-radius: 6px;
    padding: 6px 10px;
    max-width: 90%;
    white-space: pre-wrap;
    word-break: break-word;
  }
  form { display: flex; gap: 8px; }
  input[type="text"] {
    flex: 1;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
  }
  button {
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    background: #007aff;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #session-info { font-size: 12px; color: #999; }
</style>
</head>
<body>
<main>
  <h1>Claude Agent SDK 示例</h1>
  <p class="subtitle">
    独立示例应用,不依赖 niceeval。后端用 <code>@anthropic-ai/claude-agent-sdk</code> 的
    <code>query()</code> 驱动一个带 get_weather / calculate 两个工具的小助手。
  </p>
  <div id="log"></div>
  <form id="chat-form">
    <input id="input" type="text" placeholder="问我天气,或者给我一道算式…" autocomplete="off" />
    <button id="send" type="submit">发送</button>
  </form>
  <div id="session-info">session: (尚未开始)</div>
</main>

<script>
  const logEl = document.getElementById("log");
  const formEl = document.getElementById("chat-form");
  const inputEl = document.getElementById("input");
  const sendEl = document.getElementById("send");
  const sessionInfoEl = document.getElementById("session-info");

  let sessionId;

  function appendMessage(role, text) {
    const el = document.createElement("div");
    el.className = "msg " + role;
    el.textContent = text;
    logEl.appendChild(el);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function appendToolCall(call) {
    const el = document.createElement("div");
    el.className = "tool-call";
    el.textContent =
      "⚙ " + call.name + "(" + JSON.stringify(call.input) + ") → " + JSON.stringify(call.output);
    logEl.appendChild(el);
    logEl.scrollTop = logEl.scrollHeight;
  }

  formEl.addEventListener("submit", async (event) => {
    event.preventDefault();
    const message = inputEl.value.trim();
    if (!message) return;

    appendMessage("user", message);
    inputEl.value = "";
    sendEl.disabled = true;

    try {
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ message, sessionId }),
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || "请求失败");

      sessionId = data.sessionId;
      sessionInfoEl.textContent = "session: " + sessionId;

      for (const call of data.toolCalls ?? []) appendToolCall(call);
      appendMessage("assistant", data.reply);
    } catch (error) {
      appendMessage("error", "出错了: " + error.message);
    } finally {
      sendEl.disabled = false;
      inputEl.focus();
    }
  });
</script>
</body>
</html>
