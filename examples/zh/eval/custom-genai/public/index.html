<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <title>custom-genai example</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        max-width: 640px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1a1a1a;
      }
      h1 {
        font-size: 1.1rem;
        color: #555;
      }
      #log {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 1rem;
        min-height: 240px;
        margin-bottom: 1rem;
        white-space: pre-wrap;
      }
      .msg {
        margin-bottom: 0.75rem;
      }
      .msg .role {
        font-weight: 600;
      }
      .tool-call {
        margin: 0.25rem 0 0.25rem 1rem;
        padding: 0.4rem 0.6rem;
        background: #f3f3f3;
        border-radius: 6px;
        font-size: 0.85rem;
        font-family: ui-monospace, monospace;
      }
      form {
        display: flex;
        gap: 0.5rem;
      }
      input {
        flex: 1;
        padding: 0.5rem;
        font-size: 1rem;
      }
      button {
        padding: 0.5rem 1rem;
        font-size: 1rem;
      }
      .error {
        color: #b00020;
      }
    </style>
  </head>
  <body>
    <h1>custom-genai example —— 手写 OTel GenAI 埋点的最小聊天 demo</h1>
    <div id="log"></div>
    <form id="form">
      <input id="input" type="text" placeholder="问天气，或者给个算术表达式" autocomplete="off" />
      <button type="submit">发送</button>
    </form>

    <script>
      const log = document.getElementById("log");
      const form = document.getElementById("form");
      const input = document.getElementById("input");

      function appendMessage(role, text) {
        const div = document.createElement("div");
        div.className = "msg";
        div.innerHTML = `<span class="role">${role}:</span> ${escapeHtml(text)}`;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
      }

      function appendToolCall(call) {
        const div = document.createElement("div");
        div.className = "tool-call";
        div.textContent = `[tool] ${call.name}(${JSON.stringify(call.input)}) -> ${JSON.stringify(call.output)}`;
        log.appendChild(div);
      }

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const message = input.value.trim();
        if (!message) return;
        input.value = "";
        appendMessage("user", message);

        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ message }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error ?? `HTTP ${res.status}`);
          for (const call of data.toolCalls ?? []) appendToolCall(call);
          appendMessage("assistant", data.reply);
        } catch (error) {
          const div = document.createElement("div");
          div.className = "msg error";
          div.textContent = `请求失败: ${error instanceof Error ? error.message : String(error)}`;
          log.appendChild(div);
        }
      });
    </script>
  </body>
</html>
