# 本地 trace 查看器。Traceloop 官方 dashboard 是付费 SaaS,这里换成开源、免鉴权的
# Jaeger:接 OTLP HTTP(4318),UI 在 16686。想用 Traceloop 自己的产品,把 .env 里的
# OTEL_EXPORTER_OTLP_ENDPOINT 换成 https://api.traceloop.com 并配 TRACELOOP_API_KEY 即可,
# 应用侧代码(instrumentation.ts)不用改。
services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    restart: unless-stopped
    ports:
      - "4318:4318" # OTLP HTTP receiver
      - "16686:16686" # Jaeger UI
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
