<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenLLMetry 示例</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, "PingFang SC", "Segoe UI", sans-serif;
        background: #0f1115;
        color: #e6e6e6;
        display: flex;
        justify-content: center;
        padding: 24px;
      }
      main { width: 100%; max-width: 640px; }
      h1 { font-size: 18px; font-weight: 600; margin: 0 0 4px; }
      p.subtitle { color: #9aa0a6; font-size: 13px; margin: 0 0 20px; }
      #log {
        border: 1px solid #2a2d34;
        border-radius: 8px;
        padding: 12px;
        height: 420px;
        overflow-y: auto;
        background: #14161b;
        margin-bottom: 12px;
      }
      .msg { margin-bottom: 14px; }
      .msg .role { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #7a8290; margin-bottom: 2px; }
      .msg .content { white-space: pre-wrap; line-height: 1.5; }
      .msg.user .role { color: #6cb6ff; }
      .msg.assistant .role { color: #7ee2a8; }
      .toolcalls { margin-top: 6px; }
      .toolcall {
        font-size: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        background: #1c1f26;
        border: 1px solid #2a2d34;
        border-radius: 6px;
        padding: 6px 8px;
        margin-top: 4px;
        white-space: pre-wrap;
        color: #d9b96c;
      }
      form { display: flex; gap: 8px; }
      input {
        flex: 1;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #2a2d34;
        background: #14161b;
        color: #e6e6e6;
        font-size: 14px;
      }
      button {
        padding: 10px 16px;
        border-radius: 8px;
        border: none;
        background: #3d7bff;
        color: white;
        font-size: 14px;
        cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: default; }
      .hint { font-size: 12px; color: #7a8290; margin-top: 10px; }
    </style>
  </head>
  <body>
    <main>
      <h1>OpenLLMetry 示例</h1>
      <p class="subtitle">
        问「北京天气怎么样」或「12+8*3 等于多少」触发工具调用。每次请求都真调用模型,
        span 会导出到 OTEL_EXPORTER_OTLP_ENDPOINT。
      </p>
      <div id="log"></div>
      <form id="form">
        <input id="input" type="text" placeholder="问点什么…" autocomplete="off" />
        <button id="send" type="submit">发送</button>
      </form>
      <p class="hint">docker compose up -d 起本地 Jaeger 后,打开 http://localhost:16686 看 trace。</p>
    </main>
    <script>
      const log = document.getElementById("log");
      const form = document.getElementById("form");
      const input = document.getElementById("input");
      const sendBtn = document.getElementById("send");
      const sessionId = crypto.randomUUID();

      function appendMessage(role, content) {
        const div = document.createElement("div");
        div.className = `msg ${role}`;
        const roleEl = document.createElement("div");
        roleEl.className = "role";
        roleEl.textContent = role === "user" ? "你" : "助手";
        const contentEl = document.createElement("div");
        contentEl.className = "content";
        contentEl.textContent = content;
        div.appendChild(roleEl);
        div.appendChild(contentEl);
        log.appendChild(div);
        return div;
      }

      function appendToolCalls(container, toolCalls) {
        if (!toolCalls || toolCalls.length === 0) return;
        const wrap = document.createElement("div");
        wrap.className = "toolcalls";
        for (const call of toolCalls) {
          const el = document.createElement("div");
          el.className = "toolcall";
          el.textContent = `🔧 ${call.name}(${JSON.stringify(call.input)}) -> ${JSON.stringify(call.output)}`;
          wrap.appendChild(el);
        }
        container.appendChild(wrap);
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const message = input.value.trim();
        if (!message) return;

        appendMessage("user", message);
        input.value = "";
        sendBtn.disabled = true;
        const pending = appendMessage("assistant", "…");

        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ message, sessionId }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error ?? `HTTP ${res.status}`);
          pending.querySelector(".content").textContent = data.reply;
          appendToolCalls(pending, data.toolCalls);
        } catch (error) {
          pending.querySelector(".content").textContent = `出错了:${error.message}`;
        } finally {
          sendBtn.disabled = false;
          log.scrollTop = log.scrollHeight;
        }
      });
    </script>
  </body>
</html>
